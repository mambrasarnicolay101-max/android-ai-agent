<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Neural Map 3D</title>
    <script src="https://unpkg.com/3d-force-graph"></script>
    <style>
        body { margin: 0; background: #020202; color: #00ffd4; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #header { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; border-left: 3px solid #ff00ff; padding-left: 15px; }
        h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 6px; color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
        .stats { font-size: 0.7rem; margin-top: 10px; color: #00ffd4; font-weight: bold; text-transform: uppercase; }
        .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 20; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        #overlay { position: absolute; bottom: 30px; right: 30px; color: #ff00ff; font-size: 0.6rem; text-align: right; z-index: 10; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanline"></div>
    <div id="header">
        <h1>Sovereign Neural Map v4.0</h1>
        <div class="stats">SYSTEM_STATUS: <span style="color: #ff00ff;">SINGULARITY_REACHED</span> | UPTIME: <span id="uptime">--</span></div>
        <div class="stats">VECTORS: <span id="vector-count">--</span> | NODES: <span id="node-count">--</span></div>
    </div>
    <div id="overlay">NEURAL_SYNC_ACTIVE<br>ENCRYPTION: OMEGA_MESH_AES_256<br>LATENCY: 1.2ms</div>
    <div id="3d-graph"></div>

    <script>
        async function init() {
            const res = await fetch('/api/neural-map/data');
            const gData = await res.json();
            
            document.getElementById('node-count').innerText = gData.nodes.length;

            const Graph = ForceGraph3D()
                (document.getElementById('3d-graph'))
                .graphData(gData)
                .nodeLabel('label')
                .nodeColor(node => node.group === 'pilar' ? '#ff00ff' : '#00ffd4')
                .nodeRelSize(6)
                .nodeOpacity(0.9)
                .linkWidth(1)
                .linkColor(() => '#333333')
                .linkDirectionalParticles(4)
                .linkDirectionalParticleWidth(2)
                .linkDirectionalParticleSpeed(d => 0.005)
                .linkDirectionalParticleColor(() => '#ff00ff')
                .backgroundColor('#010101')
                .showNavInfo(false);

            // Fetch memory count for stats
            const memRes = await fetch('/api/memory');
            const memData = await memRes.json();
            document.getElementById('vector-count').innerText = memData.count;
            
            // Add cinematic rotation
            let angle = 0;
            setInterval(() => {
                Graph.cameraPosition({
                    x: 400 * Math.sin(angle),
                    z: 400 * Math.cos(angle)
                });
                angle += Math.PI / 1000;
            }, 10);
        }

        init();
        
        // Simple uptime timer
        let start = Date.now();
        setInterval(() => {
            let diff = Math.floor((Date.now() - start) / 1000);
            document.getElementById('uptime').innerText = diff + "s";
        }, 1000);
    </script>
</body>
</html>
