name: 🧬 Build Sovereign Aegis (Native APK)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'noir-android-native/**'
  workflow_dispatch: # Memungkinkan Anda menekan tombol "Run workflow" secara manual di GitHub

jobs:
  build:
    name: Build APK on Cloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./noir-android-native

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK (Corretto 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: 🔨 Compile & Build APK (Release)
        run: ./gradlew assembleRelease

      - name: 🚀 Upload Artifact (Aegis APK)
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Aegis-V21-Elite
          path: noir-android-native/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
